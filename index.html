<!DOCTYPE html>
<html>
<head>
<title>image.clicker</title>

<style>
body{
    background-color: palevioletred;
padding:5px;
}
h1{
font-family: arial;
}
button{
    border-radius:5px;
    margin-top: 20px;
    border:none;
    color:powderblue;
    background-color: purple;
    padding:15px 20px;
}
div{
    width:300px;
    height:300px;
    border:2px solid brown;
    border-radius:4px;
}
img{
    width:100%;
    height: 100%;
    object-fit:cover;
}

</style>
</head>
<body>
<center>
<h1>Story-Telling Intern Activity</h1>
<div id="imagebox">
<img alt="image" src="https://thumbs.dreamstime.com/b/beautiful-rain-forest-ang-ka-nature-trail-doi-inthanon-national-park-thailand-36703721.jpg" id="storyimage">
</div>
<button onclick="displayImages()">DISPLAY IMAGE</button>
</center>
<script>
const images = [
    "https://img.magnific.com/free-photo/beautiful-lake-mountains_395237-44.jpg?semt=ais_hybrid&w=740&q=80", "https://img.freepik.com/free-photo/lavender-field-sunset-near-valensole_268835-3910.jpg?semt=ais_hybrid&w=740&q=80", "https://i0.wp.com/picjumbo.com/wp-content/uploads/silhouettes-of-hawaiian-palms-at-a-gorgeous-sunset-free-image.jpeg?w=600&quality=80", "https://static.vecteezy.com/vite/assets/photo-masthead-375-BoK_p8LG.webp", "https://i0.wp.com/picjumbo.com/wp-content/uploads/calming-nature-wallpaper-free-image.jpeg?w=600&quality=80", "https://media.istockphoto.com/id/1317323736/photo/a-view-up-into-the-trees-direction-sky.jpg?s=612x612&w=0&k=20&c=i4HYO7xhao7CkGy7Zc_8XSNX_iqG0vAwNsrH1ERmw2Q="
];

function displayImages(){
let randomIndex = Math.floor(Math.random()*images.length);
    document.getElementById("storyimage").src = images[randomIndex];
    
}



</script>
</body>
</html>
